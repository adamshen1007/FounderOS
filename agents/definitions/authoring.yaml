schemaVersion: 1
id: authoring
name: Authoring Agent
status: contract-only
purpose: Propose chapter drafts from approved research and accepted specifications.
prompt: agents/prompts/contract-only.md
model: { provider: fake, name: unavailable }
permissions:
  read: [books/**, research/topics/**, specs/**]
  propose: [books/**]
  shell: false
  network: false
  git: false
  publish: false
limits: { timeoutMs: 30000, maxInputTokens: 30000, maxOutputTokens: 8000, maxCostUsd: 2, maxFiles: 100 }
outputSchema: schemas/agents/proposal.schema.json
