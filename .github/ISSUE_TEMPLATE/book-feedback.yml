name: FounderOS Playbook feedback
description: Report a confusing passage, factual concern, or worksheet problem.
title: "[Book feedback]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reviewing *The FounderOS Playbook for AI Founders*.
        Do not include company secrets, customer data, credentials, or sensitive personal information.
  - type: input
    id: version
    attributes:
      label: Book version
      description: Find this near the beginning of the book.
      placeholder: 0.9.0 Public Preview
    validations:
      required: true
  - type: input
    id: chapter
    attributes:
      label: Chapter and section
      placeholder: Chapter 5 — Talk to Users, Worksheet
    validations:
      required: true
  - type: dropdown
    id: feedback_type
    attributes:
      label: Feedback type
      options:
        - Confusing or unclear
        - Factual or source concern
        - Worksheet or checklist problem
        - Accessibility or format problem
        - Other improvement
    validations:
      required: true
  - type: textarea
    id: observation
    attributes:
      label: What happened?
      description: Describe what you read, expected, and found difficult.
    validations:
      required: true
  - type: textarea
    id: suggested_change
    attributes:
      label: Suggested change
      description: Explain what would make the passage or tool more useful.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed private company, customer, credential, and personal data.
          required: true
