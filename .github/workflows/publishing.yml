name: Publishing quality and build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install system publishing tools
        run: brew install pandoc vale

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality gates
        run: pnpm check

      - name: Verify engineering-kit example is deterministic
        run: pnpm check:example

      - name: Verify research example and provenance graph
        run: pnpm check:research

      - name: Verify governed agents with the fake provider
        env:
          OPENAI_API_KEY: ""
        run: pnpm test:agents && pnpm eval:agents && pnpm check:agent-example

      - name: Verify local Founder Workspace
        env:
          OPENAI_API_KEY: ""
        run: pnpm test:platform && pnpm check:platform

  build:
    name: Build publishing artifacts
    needs: quality
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install system publishing tools
        run: brew install pandoc vale

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and verify artifacts
        run: pnpm build

      - name: Upload publishing artifacts
        uses: actions/upload-artifact@v4
        with:
          name: founderos-playbook-${{ github.sha }}
          path: dist/books/volume-01-yc-playbook/
          if-no-files-found: error
          retention-days: 14
